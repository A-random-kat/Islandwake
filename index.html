<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Islandwake</title>
  <link rel="stylesheet" href="styles.css?v=76" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="nameGate" class="name-gate">
    <form id="nameForm" class="name-card">
      <span>Captain name</span>
      <input id="captainNameInput" maxlength="18" autocomplete="off" placeholder="Enter your name" />
      <button type="submit">Set sail</button>
    </form>
  </div>

  <div id="hud">
    <section class="panel captain">
      <div>
        <strong id="playerName">Captain</strong>
        <span id="modeLabel">At sea</span>
      </div>
      <div class="bars">
        <div class="bar hp"><span id="hpBar"></span></div>
        <div class="bar xp"><span id="xpBar"></span></div>
      </div>
      <div class="stats" id="statsLine"></div>
    </section>

    <section class="panel tools">
      <button id="toolCannon" class="active" title="Cannon"><span>C</span></button>
      <button id="toolRod" title="Fishing rod"><span>2</span></button>
      <button id="toolGlass" title="Spyglass"><span>G</span></button>
    </section>

    <section class="panel cargo">
      <strong>Cargo</strong>
      <div id="cargoList"></div>
    </section>

    <section id="spyPanel" class="panel spy hidden">
      <strong id="spyName">No target</strong>
      <div id="spyDetails"></div>
    </section>
  </div>

  <section id="minimapPanel" class="panel minimap">
    <header>
      <strong>Map</strong>
      <div>
        <button id="closeMinimap" title="Hide minimap">x</button>
      </div>
    </header>
    <canvas id="minimap" width="180" height="180"></canvas>
  </section>
  <button id="openMinimap" class="minimap-open hidden" title="Open minimap">Map</button>

  <section id="leaderboardPanel" class="panel leaderboard">
    <header>
      <strong>Gold</strong>
      <button id="closeLeaderboard" title="Hide leaderboard">x</button>
    </header>
    <ol id="leaderboardList"></ol>
  </section>
  <button id="openLeaderboard" class="leaderboard-open hidden" title="Open leaderboard">Gold</button>

  <div id="dockPrompt" class="prompt hidden">Press <b>T</b> to dock</div>
  <div id="toast"></div>

  <aside id="shop" class="shop hidden">
    <header>
      <div>
        <span id="shopIsland">Island</span>
        <strong>Harbor Market</strong>
      </div>
      <button id="closeShop" title="Close">x</button>
    </header>
    <nav>
      <button class="tab active" data-tab="goods">Goods</button>
      <button class="tab" data-tab="ships">Ships</button>
      <button class="tab" data-tab="upgrades">Upgrades</button>
    </nav>
    <div id="shopBody"></div>
  </aside>

  <script type="module" src="game.js?v=88"></script>
</body>
</html>
